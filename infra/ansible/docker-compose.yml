services:
  node1:
    image: ubuntu:22.04
    container_name: ansible-node1
    command: >
      bash -lc "apt-get update &&
      apt-get install -y python3 sudo &&
      sleep infinity"
    networks:
      - ansible-net

  node2:
    image: ubuntu:22.04
    container_name: ansible-node2
    command: >
      bash -lc "apt-get update &&
      apt-get install -y python3 sudo &&
      sleep infinity"
    networks:
      - ansible-net

networks:
  ansible-net:
    name: ansible-net
