---
- name: Créer le répertoire d'application
  file:
    path: /opt/app
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Déployer un fichier d'environnement applicatif
  copy:
    content: |
      APP_ENV=production
      APP_PORT=3000
    dest: /opt/app/.env
    mode: "0600"
