{{- if .Values.postgresql.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devops-app.fullname" . }}-postgres
  labels:
    {{- include "devops-app.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "devops-app.fullname" . }}-postgres
  template:
    metadata:
      labels:
        app: {{ include "devops-app.fullname" . }}-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgresql.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.config.dbName | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.secret.dbUser | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.secret.dbPassword | quote }}
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: {{ include "devops-app.fullname" . }}-postgres-pvc
{{- end }}
