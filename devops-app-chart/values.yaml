replicaCount: 3

image:
  repository: devops-app
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  host: devops.local

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

config:
  nodeEnv: production
  logLevel: info
  appPort: "3000"
  dbHost: "devops-app-postgres-svc"
  dbPort: "5432"
  dbName: "appdb"

secret:
  dbUser: appuser
  dbPassword: ""

postgresql:
  enabled: true
  image: postgres:16-alpine
  storage:
    size: 1Gi

probes:
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
