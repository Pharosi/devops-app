name: CI/CD Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: cd app && npm ci

      - name: Run tests
        run: |
          cd app
          set -o pipefail
          npm test 2>&1 | tee test-output.txt

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-output-node-${{ matrix.node-version }}
          path: app/test-output.txt

  build:
    needs: test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image-name: devops-app
      context: ./app
      dockerfile: Dockerfile

  security:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup DevOps tools
        uses: ./.github/actions/setup-tools
        with:
          install-terraform: "true"
          terraform-version: "1.7.0"

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            gpg --dearmor | \
            sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | \
          sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan dependencies
        run: trivy fs --scanners vuln --severity HIGH,CRITICAL --exit-code 1 --format table app/

      - name: Scan Dockerfile config
        run: trivy config --severity HIGH,CRITICAL --exit-code 0 app/Dockerfile

      - name: Scan IaC files
        run: trivy config --severity HIGH,CRITICAL --exit-code 0 infra/

      - name: Build image for scanning
        run: docker build -t devops-app:scan app/

      - name: Generate Trivy SARIF
        run: trivy image --scanners vuln --severity HIGH,CRITICAL --format sarif --output trivy-results.sarif devops-app:scan

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

      - name: Upload Trivy artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: trivy-results
          path: trivy-results.sarif

      - name: Scan Docker image
        run: trivy image --scanners vuln --severity CRITICAL --exit-code 1 --format table devops-app:scan

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Dockerfile policy
        run: docker run --rm -v "$PWD:/project" -w /project openpolicyagent/conftest test app/Dockerfile --policy policies --namespace dockerfile --parser dockerfile

      - name: Check Kubernetes policies
        run: docker run --rm -v "$PWD:/project" -w /project openpolicyagent/conftest test k8s/app.yaml k8s/postgres.yaml --policy policies --namespace kubernetes

  deploy-staging:
    needs: [build, security]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - run: echo "Deploying to staging..."

  deploy-production:
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Deploying to production..."
